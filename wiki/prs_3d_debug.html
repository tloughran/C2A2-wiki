var PRS_TRIPLETS = [{"id": "arkanihamed-PRS-01", "thinker": "arkanihamed", "prs_num": "01", "label": "P1 (Text, referenced in Hoffman section) \u2014 Spacetime as non-fundamental", "problem": "Quantum mechanics and general relativity both assume spacetime as a background structure, but this assumption may be preventing unification \u2014 spacetime may not be fundamental", "resource": "The amplituhedron: a geometric structure (Arkani-Hamed et al., 2013) that computes particle scattering amplitudes without reference to spacetime \u2014 locality and unitarity are derived, not assumed", "solution": "The amplituhedron demonstrates that a key quantity in physics can be computed without spacetime as scaffolding \u2014 suggesting spacetime is emergent from a deeper, pre-geometric structure", "date": "1998-06-01", "pub_year": 1998, "confidence": "High"}, {"id": "arkanihamed-PRS-02", "thinker": "arkanihamed", "prs_num": "02", "label": "P2 (Implicit from RC Pilot context) \u2014 Geometry as prior to physics", "problem": "Standard physics formalisms (Feynman diagrams, locality) are computationally cumbersome and conceptually opaque \u2014 they obscure deep structural features of particle interactions", "resource": "On-shell methods and geometric formulation: replacing Feynman diagrams with direct geometric structures where amplitudes are volumes of mathematical objects", "solution": "A research program demonstrating that the correct mathematical language for fundamental physics is geometric-combinatorial rather than field-theoretic \u2014 amplitudes as volumes of polytopes in mathematical spaces", "date": "2013-06-01", "pub_year": 2013, "confidence": "Medium"}, {"id": "arkanihamed-PRS-03", "thinker": "arkanihamed", "prs_num": "03", "label": "P3 (Speculative \u2014 from Hoffman connection) \u2014 Consciousness and the derivation of spacetime", "problem": "If spacetime is emergent rather than fundamental, something must be more fundamental \u2014 but what? Hoffman proposes conscious agent networks; Arkani-Hamed's amplituhedron may be the bridge", "resource": "Proposed connection (Hoffman + Arkani-Hamed): conscious agent mathematics as the pre-geometric structure from which amplituhedron results and spacetime could be derived", "solution": "An as-yet-incomplete research program exploring whether the mathematical structures underlying amplituhedron physics can be derived from or related to the mathematics of conscious agent networks \u2014 a physics-consciousness bridge", "date": "2026-04-05", "pub_year": 2026, "confidence": "Speculative"}, {"id": "arkanihamed-PRS-04", "thinker": "arkanihamed", "prs_num": "04", "label": "P4 (Implicit) \u2014 Beauty as a guide in fundamental physics", "problem": "Without experimental access to the Planck scale, how do physicists distinguish promising from unpromising theoretical directions? What epistemic standards apply in the absence of direct empirical tests?", "resource": "Mathematical beauty and structural inevitability as epistemic guides: Arkani-Hamed's consistent appeal to 'the inevitability of the result' as a criterion for theoretical depth", "solution": "A methodology for pre-empirical physics that uses structural inevitability (a result that 'could not have been otherwise') as a validity criterion \u2014 complementary to, not a replacement for, empirical confirmation", "date": "2026-04-05", "pub_year": 2026, "confidence": "Medium"}, {"id": "arkanihamed-PRS-05", "thinker": "arkanihamed", "prs_num": "05", "label": "P5 (PROP-2026-04-08-001) \u2014 Positive geometry as universal language of fundamental physics", "problem": "Particle physics has no unified geometric language \u2014 Feynman diagrams are computationally useful but conceptually opaque, and quantum mechanics and spacetime remain formally unreconciled", "resource": "Positive geometry as a unifying mathematical framework \u2014 bridging scattering amplitudes (particle physics), cosmological correlators, and deep structures in combinatorics and algebraic geometry; taught by Arkani-Hamed at UNIVERSE+ School Les Houches, March 30\u2013April 10, 2026", "solution": "A research program establishing that the correct computational language for fundamental physics is combinatorial-geometric rather than field-theoretic, with locality and unitarity emerging from geometry rather than being assumed", "date": "2026-04-08", "pub_year": 2026, "confidence": "High"}, {"id": "arkanihamed-PRS-06", "thinker": "arkanihamed", "prs_num": "06", "label": "P6 (PROP-2026-04-08-001) \u2014 Quantum mechanics as combinatorial-geometric structure", "problem": "The mathematical framework of quantum mechanics was developed without a unified geometric picture \u2014 its combinatorial and algebraic structures remain poorly understood at the foundations", "resource": "Combinatorial geometry as the foundational language of quantum mechanics \u2014 developed through amplituhedron geometry and generalized to cosmological correlators; the same framework covers both QM and spacetime", "solution": "A systematic reformulation showing that quantum mechanical amplitudes are volumes of combinatorially defined geometric objects \u2014 making the combinatorial structure of QM explicit without reference to spacetime scaffolding", "date": "2026-04-08", "pub_year": 2026, "confidence": "Medium"}, {"id": "arkanihamed-PRS-07", "thinker": "arkanihamed", "prs_num": "07", "label": "P7 (PROP-2026-04-08-007) \u2014 Combinatorial structure of the cosmological wavefunction", "problem": "The amplituhedron showed that scattering amplitudes can be computed without spacetime, but it remained unclear whether this geometric-combinatorial approach extended to cosmology \u2014 to the structure of the universe itself", "resource": "The cosmohedron (Arkani-Hamed et al., March 2026): a polytope encoding the cosmological wavefunction for Tr(\u03c6\u00b3) theory; faces in bijection with Matryoshka structures (nested polygon subdivisions); proves the correctness of the conjectured construction", "solution": "The cosmohedron demonstrates that the cosmological wavefunction \u2014 the quantum state of the entire universe \u2014 can be computed from a geometric object without spacetime scaffolding; the post-spacetime program now applies to cosmological structure itself", "date": "2026-04-16", "pub_year": 2026, "confidence": "High"}, {"id": "arkanihamed-PRS-08", "thinker": "arkanihamed", "prs_num": "08", "label": "P8 (PROP-2026-04-13-012) \u2014 Hidden structure and particle unification", "problem": "Different particle types (scalars, pions, gluons) appear as distinct entities in the Standard Model formalism \u2014 there is no known reason why their scattering amplitudes should be related at the l", "resource": "", "solution": "", "date": "", "pub_year": 2020, "confidence": "Medium"}, {"id": "carroll-PRS-01", "thinker": "carroll", "prs_num": "01", "label": "P1 (Text, pp.41\u201353) \u2014 Ontological closure vs. emergence", "problem": "Physicalism cannot easily account for consciousness, agency, or meaning without either eliminating them or invoking explanatory gaps", "resource": "Poetic naturalism: multiple levels of description (particles, organisms, persons) are all legitimate stories told about the same physical substrate", "solution": "A fully naturalist account of mind, meaning, and value that requires no ontological additions to physics, while preserving the validity of higher-level descriptions", "date": "2004-06-01", "pub_year": 2004, "confidence": "High"}, {"id": "carroll-PRS-02", "thinker": "carroll", "prs_num": "02", "label": "P2 (Text, pp.44\u201347) \u2014 Quantum interpretation", "problem": "The measurement problem in quantum mechanics creates apparent discontinuities that tempt non-physical interpretations (consciousness causes collapse, etc.)", "resource": "Many-Worlds Interpretation: the wavefunction never collapses; all outcomes occur in branching Everettian worlds", "solution": "A philosophically principled resolution of the measurement problem that invokes no consciousness, no hidden variables, and no new physics \u2014 just the unmodified Schr\u00f6dinger equation", "date": "2016-06-01", "pub_year": 2016, "confidence": "High"}, {"id": "carroll-PRS-03", "thinker": "carroll", "prs_num": "03", "label": "P3 (Text, pp.47\u201353) \u2014 Rival theory evaluation", "problem": "Novel physical theories (Wolfram Physics, Quantum Holonomy Theory, Conscious Realism) claim to unify physics but lack empirical traction", "resource": "Bayesian theory confirmation: novel theories must demonstrate tangible explanatory gains over established physics before warranting acceptance", "solution": "A methodological standard that keeps physics honest: welcome novel frameworks but require them to recover known physics and generate new predictions", "date": "2026-04-03", "pub_year": 2026, "confidence": "High"}, {"id": "carroll-PRS-04", "thinker": "carroll", "prs_num": "04", "label": "P4 (Implicit) \u2014 Agency without dualism", "problem": "Accounts of human agency often require either dualism (a non-physical will acting on the body) or eliminativism (agency is an illusion)", "resource": "Carroll's compatibilism: agency is a useful high-level description of physical processes; free will is compatible with determinism if properly understood", "solution": "A deflationary but non-eliminativist account of agency: persons really do act, but acting is a pattern in the physical substrate, not a violation of it \u2014 preserving moral responsibility without dualism", "date": "2026-04-03", "pub_year": 2026, "confidence": "Medium"}, {"id": "carroll-PRS-05", "thinker": "carroll", "prs_num": "05", "label": "P5 (Implicit) \u2014 Science\u2013religion dialogue", "problem": "Science and religion appear to conflict because both make claims about the same domain (reality); naive harmony is intellectually dishonest", "resource": "Poetic naturalism's distinction between core ontology (physics) and useful stories (meaning, value, purpose) \u2014 religion traffics in the latter", "solution": "A framework where science and religion can coexist without either capitulating: science owns the core ontology, religion provides coherent stories about meaning at the human level", "date": "2026-04-03", "pub_year": 2026, "confidence": "Medium"}, {"id": "carroll-PRS-06", "thinker": "carroll", "prs_num": "06", "label": "P6 (Implicit, via document contrast) \u2014 Physicalism's explanatory limit", "problem": "Carroll's framework has no resources for explaining why there is something rather than nothing, or why mathematical structures are empirically instantiated", "resource": "Carroll's own use of the 'why is there something?' question as an edge of physics \u2014 acknowledging limits", "solution": "An acknowledged boundary condition that opens space for Thomistic engagement: Carroll's naturalism, rigorously applied, reaches its own limit precisely where Thomistic metaphysics begins", "date": "2026-04-03", "pub_year": 2026, "confidence": "High"}, {"id": "carroll-PRS-07", "thinker": "carroll", "prs_num": "07", "label": "P7 (PROP-2026-04-07-004) \u2014 Observer-centric quantum gravity", "problem": "Quantum mechanics and general relativity remain unreconciled after decades of effort, with no convergence on a theory of quantum gravity", "resource": "A new observer-centric framework (Harlow et al.) \u2014 treating the observer as a classical, mathematically well-defined entity within the theory, with new rules for observer-system interactions", "solution": "Rather than deriving the observer from quantum mechanics, build the observer into the foundations \u2014 a \"precise Copenhagen\" that may resolve the measurement problem while naturally incorporating gravitational effects", "date": "2026-04-07", "pub_year": 2026, "confidence": "Medium"}, {"id": "carroll-PRS-08", "thinker": "carroll", "prs_num": "08", "label": "P8 (PROP-2026-04-08-004) \u2014 Intelligence as multidimensional across species", "problem": "Carr perates as a separate conscious agent; when integrated, a single unified self emerges \u2014 empirical proof of conscious agent fusion", "solution": "Split-brain evidence supports Conscious Realism's mathematical claim that agent networks form higher-order agents \u2014 providing empirical grounding for a theoretical claim that had lacked it", "date": "2026-04-05", "pub_year": 2026, "confidence": "Medium"}, {"id": "mcgilchrist-PRS-05", "thinker": "mcgilchrist", "prs_num": "05", "label": "P5 (Implicit) \u2014 Attention as ontological act", "problem": "Contemporary epistemology treats attention as a cognitive function rather than an ontological act \u2014 missing that the mode of attending constitutes the kind of world that shows up", "resource": "McGilchrist's claim that attention is world-constituting: the mode of attention (right vs. left hemisphere) shapes not just what we see but what kind of world is disclosed", "solution": "A philosophy of attention as ontological action \u2014 compatible with Friston's precision-weighted prediction (attention as evidence weighting) and Hoffman's interface theory (attention as fitness-tuned perception)", "date": "2026-04-05", "pub_year": 2026, "confidence": "Medium"}, {"id": "mcgilchrist-PRS-06", "thinker": "mcgilchrist", "prs_num": "06", "label": "P6 (Implicit) \u2014 Embodied tradition formation", "problem": "Traditions transmit more than propositions \u2014 they transmit embodied skills, perceptual habits, and tacit knowledge that resist formalization; modern institutions systematically lose this", "resource": "McGilchrist's account of embodied cognition: right-hemisphere knowledge is skill-based, contextual, and person-involving \u2014 not merely propositional", "solution": "Tradition formation requires deliberate cultivation of right-hemisphere engagement: mentorship, shared practice, contextual immersion \u2014 not information transfer alone; implications for C2A2's tradition-accelerator design", "date": "2026-04-05", "pu // Use pub_year for vertical placement; range spans ~1977-2026
var allYears = PRS_TRIPLETS.map(function(t) { return t.pub_year || 2020; });
var minYear = Math.min.apply(null, allYears);
var maxYear = Math.max.apply(null, allYears);
var zHeight = 40; // total vertical span

function yearToZ(year) {
  if (maxYear === minYear) return zHeight / 2;
  return 2 + ((year - minYear) / (maxYear - minYear)) * (zHeight - 4);
}

function dateToZ(dateStr) {
  if (!dateStr) return zHeight / 2;
  var year = parseInt(dateStr.slice(0, 4));
  return yearToZ(year);
}

  camera = new THREE.PerspectiveCamera(50, cw / ch, 0.1, 500);
  updateCameraPosition();

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(cw, ch);
  container.appendChild(renderer.domElement);

  raycaster = new THREE.Raycaster();
  raycaster.params.Points = { threshold: 0.5 };
  mouse = new THREE.Vector2();

  // Lights
  var ambient = new THREE.AmbientLight(0x404060, 0.6);
  scene.add(ambient);
  var dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(20, 40, 30);
  scene.add(dirLight);
  var pointLight = new THREE.PointLight(0xC9A84C, 0.4, 100);
  pointLight.position.set(0, zHeight, 0);
  scene.add(pointLight);

  buildDisciplineSlices();
  buildPRSNodes();
  buildThreads();
  buildLegend();
  buildCrossConnectionLines();

  // Events
  renderer.domElement.addEventListener('mousedown', onMouseDown);
  renderer.domElement.addEventListener('mousemove', onMouseMove);
  renderer.domElement.addEventListener('mouseup', onMouseUp);
  renderer.domElement.addEventListener('wheel', onWheel);
  renderer.domElement.addEventListener('dblclick', onDoubleClick);
  window.addEventListener('resize', onResize);

  animate();
}

// ── DISCIPLINE SLICES (floor pie) ──
function buildDisciplineSlices() {
  DISCIPLINES.forEach(function(disc, i) {
    var startAngle = getDiscAngle(i) - discAngle / 2;
    var endAngle = getDiscAngle(i) + discAngle / 2;

    // Create a filled wedge on the floor
    var shape = new THREE.Shape();
    shape.moveTo(0, 0);
    var segments = 24;
    for (var s = 0; s <= segments; s++) {
      var a = startAngle + (endAngle - startAngle) * (s / segments);
      shape.lineTo(Math.cos(a) * discRadius, Math.sin(a) * discRadius);
    }
    shape.lineTo(0, 0);

    var geo = new THREE.ShapeGeometry(shape);
    var mat = new THREE.MeshBasicMaterial({
      color: new THREE.Color(0x1a1a2e),
      transparent: true,
      opacity: 0.35,
      side: THREE.DoubleSide,
    });
    var mesh = new THREE.Mesh(geo, mat);
    mesh.rotation.x = -Math.PI / 2;
    mesh.position.y = 0;
    mesh.userData = { type: 'discipline', discipline: disc, index: i };
    scene.add(mesh);
    discMeshes.push(mesh);

    // Divider lines between slices
    var lineGeo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(0, 0.05, 0),
      new THREE.Vector3(Math.cos(startAngle) * discRadius, 0.05, -Math.sin(startAngle) * discRadius),
    ]);
    var lineMat = new THREE.LineBasicMaterial({ color: 0x2a2a3e, transparent: true, opacity: 0.6 });
    var line = new THREE.Line(lineGeo, lineMat);
    scene.add(line);
    discMeshes.push(line);
  });
}

// ── PRS NODES ──
function buildPRSNodes() {
  PRS_TRIPLETS.forEach(function(triplet) {
    var disc = THINKER_DISC[triplet.thinker] || 'Systems Integration';
    var dIdx = getDiscIndex(disc);
    if (dIdx < 0) dIdx = 0;
    var baseAngle = getDiscAngle(dIdx);
    var thinkerOffset = getThinkerAngleOffset(triplet.thinker);
    var angle = baseAngle + thinkerOffset;

    var z = dateToZ(triplet.date);
    var color = new THREE.Color(THINKER_COLORS[triplet.thinker] || '#888888');

    // Place P, R, S as three connected nodes
    var prsTypes = ['problem', 'resource', 'solution'];
    var prsTexts = [triplet.problem, triplet.resource, triplet.solution];
    var radii = [0.35, 0.45 * getResourceScale(triplet), 0.35];
    var rOffsets = [0.6, 0.75, 0.9]; // radial position fraction within the slice

    var nodeGroup = [];

    prsTypes.forEach(function(pType, pi) {
      var r = discRadius * rOffsets[pi];
      var x = Math.cos(angle) * r;
      var yPos = z + pi * 1.2; // stack slightly along z (vertical)
      var zPos = -Math.sin(angle) * r;

      var nodeColor = color.clone();
      if (pType === 'problem') nodeColor.offsetHSL(0, 0, -0.1);
      if (pType === 'solution') nodeColor.offsetHSL(0, 0, 0.1);

      var geo;
      if (pType === 'problem') {
        // Octahedron for problems
        geo = new THREE.OctahedronGeometry(radii[pi], 0);
      } else if (pType === 'resource') {
        // Sphere for resources (scaled by pluripotency)
        geo = new THREE.SphereGeometry(radii[pi], 12, 8);
      } else {
        // Dodecahedron for solutions
        geo = new THREE.DodecahedronGeometry(radii[pi], 0);
      }

      var mat = new THREE.MeshPhongMaterial({
        color: nodeColor,
        emissive: nodeColor.clone().multiplyScalar(0.2),
        shininess: 40,
        transparent: true,
        opacity: 0.9,
      });
      var mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(x, yPos, zPos);
      mesh.userData = {
        type: 'prs',
        prsType: pType,
        triplet: triplet,
        text: prsTexts[pi],
        thinker: triplet.thinker,
      };
      scene.add(mesh);
      meshes.push(mesh);
      nodeGroup.push(mesh);
    });

    // Connect P → R → S with thin lines
    if (nodeGroup.length === 3) {
      for (var li = 0; li < 2; li++) {
        var pts = [nodeGroup[li].position.clone(), nodeGroup[li + 1].position.clone()];
        var lGeo = new THREE.BufferGeometry().setFromPoints(pts);
        var lMat = new THREE.LineBasicMaterial({
          color: color,
          transparent: true,
          opacity: 0.5,
        });
        var line = new THREE.Line(lGeo, lMat);
        line.userData = { type: 'thread', thinker: triplet.thinker };
        scene.add(line);
        threadLines.push(line);
      }
    }
  });
}

// ── CROSS-TRADITION CONNECTION LINES ──
function buildCrossConnectionLines() {
  // Find triplets that share cross-connections via findings
  // Group triplets by thinker for cross-discipline arcs
  var thinkerTriplets = {};
  PRS_TRIPLETS.forEach(function(t) {
    if (!thinkerTriplets[t.thinker]) thinkerTriplets[t.thinker] = [];
    thinkerTriplets[t.thinker].push(t);
  });

  // Draw arcs between thinkers mentioned in the same finding
  FINDINGS.forEach(function(finding) {
    var progs = finding.programs.split(',').map(function(p) {
      return p.trim().replace(/ Agent$/, '').replace(/ \(.*$/, '').toLowerCase();
    });
    // Normalize to our thinker keys
    var thinkers = progs.filter(function(p) { return THINKER_COLORS[p]; });
    // Unique pairs
    for (var i = 0; i < thinkers.length; i++) {
      for (var j = i + 1; j < thinkers.length; j++) {
        var t1 = thinkerTriplets[thinkers[i]];
        var t2 = thinkerTriplets[thinkers[j]];
        if (!t1 || !t2 || !t1.length || !t2.length) continue;

        // Connect the resource nodes of the first triplet of each
        var r1Idx = meshes.findIndex(function(m) {
          return m.userData.type === 'prs' && m.userData.prsType === 'resource' && m.userData.thinker === thinkers[i];
        });
        var r2Idx = meshes.findIndex(function(m) {
          return m.userData.type === 'prs' && m.userData.prsType === 'resource' && m.userData.thinker === thinkers[j];
        });

        if (r1Idx >= 0 && r2Idx >= 0) {
          var p1 = meshes[r1Idx].position.clone();
          var p2 = meshes[r2Idx].position.clone();
          // Create curved arc
          var mid = p1.clone().add(p2).multiplyScalar(0.5);
          mid.y += 3; // arc upward
          var curve = new THREE.QuadraticBezierCurve3(p1, mid, p2);
          var points = curve.getPoints(20);
          var arcGeo = new THREE.BufferGeometry().setFromPoints(points);
          var arcMat = new THREE.LineBasicMaterial({
            color: 0xC9A84C,
            transparent: true,
            opacity: 0.15,
          });
          var arc = new THREE.Line(arcGeo, arcMat);
          arc.userData = { type: 'cross', finding: finding };
          scene.add(arc);
          threadLines.push(arc);
        }
      }
    }
  });
}

// ── TRADITION FILTERS (left panel checkboxes) ──
var prsFilterState = {}; // thinker -> boolean

  var container = document.getElementById('prs-tradition-filters');

    html += '<input type="checkbox" id="prs-chk-' + t + '" checked onchange="prsToggleThinker(\'' + t + '\', this.checked)">';
    html += '<span class="prs-filter-dot" style="background:' + THINKER_COLORS[t] + '"></span>';
    html += '<span class="prs-filter-label">' + THINKER_DISPLAY[t] + '</span>';
    html += '</div>';
  });
  container.innerHTML = html;
}

function prsToggleThinker(thinker, checked) {
  prsFilterState[thinker] = checked;
  applyPRSFilters();
  // Update All checkbox
  var allChecked = Object.keys(prsFilterState).every(function(t) { return prsFilterState[t]; });
  document.getElementById('prs-chk-all').checked = allChecked;
}

function prsToggleAll(checked) {
  Object.keys(prsFilterState).forEach(function(t) {
    prsFilterState[t] = checked;
    var chk = document.getElementById('prs-chk-' + t);
    if (chk) chk.checked = checked;
  });
  applyPRSFilters();
}

function applyPRSFilters() {
  meshes.forEach(function(m) {
    if (m.userData.thinker) {
      m.visible = prsFilterState[m.userData.thinker] !== false;
    }
  });
  threadLines.forEach(function(l) {
    if (l.userData.thinker) {
      l.visible = prsFilterState[l.userData.thinker] !== false && showThreads;
    } else if (l.userData.type === 'cross') {
      // Cross-connection arcs: visible if both connected thinkers are visible
      l.visible = showThreads;
    }
  });
}

// ── SEARCH ──
function prsSearch(query) {
  var resultsEl = document.getElementById('prs-search-results');
  var clearBtn = document.getElementById('prs-search-clear');
  if (!query || query.length < 2) {
    resultsEl.innerHTML = '';
    clearBtn.style.display = 'none';
    // Reset all node opacity
    meshes.forEach(function(m) {
      if (m.userData.type === 'prs' && m.material) {
        m.material.opacity = 0.9;
        m.material.emissive.copy(new THREE.Color(THINKER_COLORS[m.userData.thinker] || '#888').multiplyScalar(0.2));
      }
    });
    return;
  }
  clearBtn.style.display = 'inline-block';
  var q = query.toLowerCase();
  var hits = [];
  PRS_TRIPLETS.forEach(function(t) {
    var searchable = (t.label + ' ' + t.problem + ' ' + t.resource + ' ' + t.solution).toLowerCase();
    if (searchable.indexOf(q) >= 0) {
      hits.push(t);
    }
  });

  // Dim non-matching nodes, highlight matching
  var hitIds = {};
  hits.forEach(function(h) { hitIds[h.id] = true; });
  meshes.forEach(function(m) {
    if (m.userData.type === 'prs') {
      var isHit = hitIds[m.userData.triplet.id];
      m.material.opacity = isHit ? 1.0 : 0.15;
      if (isHit) {
        m.material.emissive.setHex(0x555555);
      } else {
        m.material.emissive.copy(new THREE.Color(THINKER_COLORS[m.userData.thinker] || '#888').multiplyScalar(0.1));
      }
    }
  });

  var html = '<div style="color:#888;margin-bottom:4px">' + hits.length + ' result' + (hits.length !== 1 ? 's' : '') + '</div>';
  hits.slice(0, 15).forEach(function(h) {
    var tName = THINKER_DISPLAY[h.thinker] || h.thinker;
    var tColor = THINKER_COLORS[h.thinker] || '#888';
    html += '<div class="prs-search-hit" onclick="prsSearchClickResult(\'' + h.id + '\')">';
    html += '<span class="hit-thinker" style="color:' + tColor + '">' + tName + '</span> ';
    html += '<span>' + h.label + '</span>';
    html += '</div>';
  });
  if (hits.length > 15) {
    html += '<div style="color:#666;font-size:10px;margin-top:4px">...and ' + (hits.length - 15) + ' more</div>';
  }
  resultsEl.innerHTML = html;
}

function prsSearchClickResult(tripletId) {
  // Find the resource node for this triplet and click it
  var target = meshes.find(function(m) {
    return m.userData.type === 'prs' && m.userData.prsType === 'resource' && m.userData.triplet && m.userData.triplet.id === tripletId;
  });
  if (target) {
    showNodeInfo(target);
    // Center camera on it
    cameraTarget.copy(target.position);
    cameraRadius = 30;
    updateCameraPosition();
  }
}

function prsClearSearch() {
  document.getElementById('prs-search-box').value = '';
  prsSearch('');
}

// ── CAMERA ──
function updateCameraPosition() {
  var x = cameraRadius * Math.sin(cameraPhi) * Math.cos(cameraTheta);
  var y = cameraRadius * Math.cos(cameraPhi);
  var z = cameraRadius * Math.sin(cameraPhi) * Math.sin(cameraTheta);
  camera.position.set(
    cameraTarget.x + x,
    cameraTarget.y + y,
    cameraTarget.z + z
  );
  camera.lookAt(cameraTarget);
}

function resetCamera() {
  cameraTheta = Math.PI * 0.25;
  cameraPhi = Math.PI * 0.35;
  cameraRadius = 50;
  cameraTarget.set(0, zHeight / 2, 0);
  updateCameraPosition();
}

// ── EVENTS ──
function onMouseDown(e) {
  isMouseDown = true;
  mouseDownPos = { x: e.clientX, y: e.clientY };
  lastMouse = { x: e.clientX, y: e.clientY };
}

function onMouseMove(e) {
  if (isMouseDown) {
    var dx = e.clientX - lastMouse.x;
    var dy = e.clientY - lastMouse.y;
    cameraTheta -= dx * 0.005;
    cameraPhi = Math.max(0.1, Math.min(Math.PI * 0.85, cameraPhi - dy * 0.005));
    updateCameraPosition();
    lastMouse = { x: e.clientX, y: e.clientY };
  }

  // Hover detection
  var rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  var intersects = raycaster.intersectObjects(meshes);
  var tooltip = document.getElementById('tooltip');
  renderer.domElement.style.cursor = 'default';

  if (intersects.length > 0) {
    var hit = intersects[0].object;
    if (hit.userData.type === 'prs') {
      renderer.domElement.style.cursor = 'pointer';
      hoveredMesh = hit;

      var typeLabel = hit.userData.prsType.charAt(0).toUpperCase() + hit.userData.prsType.slice(1);
      var tName = THINKER_DISPLAY[hit.userData.thinker] || hit.userData.thinker;
      tooltip.innerHTML = '<strong>' + tName + '</strong> &mdash; ' + typeLabel +
        '<br><span style="color:#888">' + (hit.userData.text || '').slice(0, 120) + '</span>';
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top = (e.clientY + 14) + 'px';

      // Highlight
      if (selectedMesh !== hit) {
        hit.material.emissive.setHex(0x444444);
      }
    }
  } else {
    if (hoveredMesh && hoveredMesh !== selectedMesh) {
      var origColor = new THREE.Color(THINKER_COLORS[hoveredMesh.userData.thinker] || '#888888');
      hoveredMesh.material.emissive.copy(origColor.multiplyScalar(0.2));
    }
    hoveredMesh = null;
    tooltip.style.display = 'none';
  }
}

function onMouseUp(e) {
  isMouseDown = false;
  var dist = Math.sqrt(Math.pow(e.clientX - mouseDownPos.x, 2) + Math.pow(e.clientY - mouseDownPos.y, 2));
  if (dist < 5) {
    // It's a click, not a drag
    onClick(e);
  }
}

function onClick(e) {
  var rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  var intersects = raycaster.intersectObjects(meshes);

  if (intersects.length > 0) {
    var hit = intersects[0].object;
    if (hit.userData.type === 'prs') {
      showNodeInfo(hit);
    }
  } else {
    closePanel();
  }
}

function onDoubleClick(e) {
  // Double-click to center on a node
  var rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  var intersects = raycaster.intersectObjects(meshes);
  if (intersects.length > 0) {
    cameraTarget.copy(intersects[0].object.position);
    updateCameraPosition();
  }
}

function onWheel(e) {
  cameraRadius = Math.max(15, Math.min(120, cameraRadius + e.deltaY * 0.05));
  updateCameraPosition();
  e.preventDefault();
}

function onResize() {
  var container = document.getElementById('canvas-container');
  var w = container.clientWidth;
  var h = container.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}

function showNodeInfo(mesh) {

  var d = mesh.userData;

  var panel = document.getElementById('info-panel');
  var content = document.getElementById('info-content');

  var typeClass = d.prsType;
  var typeLabel = d.prsType.charAt(0).toUpperCase() + d.prsType.slice(1);
  var tName = THINKER_DISPLAY[d.thinker] || d.thinker;
  var tColor = THINKER_COLORS[d.thinker] || '#888';
  var disc = THINKER_DISC[d.thinker] || '';

  var html = '<h3>' + triplet.label + '</h3>';
  html += '<span class="thinker-tag" style="background:' + tColor + '33;color:' + tColor + '">' + tName + '</span>';
  html += '<span class="prs-type ' + typeClass + '">' + typeLabel + '</span>';
  html += '<div class="field-label">Discipline</div>';
  html += '<div class="field-value">' + disc + '</div>';
  html += '<div class="field-label">Problem</div>';
  html += '<div class="field-value">' + triplet.problem + '</div>';
  html += '<div class="field-label">Resource</div>';
  html += '<div class="field-value">' + triplet.resource + '</div>';
  html += '<div class="field-label">Solution</div>';
  html += '<div class="field-value">' + triplet.solution + '</div>';
  html += '<div class="field-label">Publication Year</div>';
  html += '<div class="field-value">' + (triplet.pub_year || 'Unknown') + '</div>';
  html += '<div class="field-label">Confidence</div>';
  html += '<div class="field-value">' + triplet.confidence + '</div>';

  // Find related cross-connections
  var related = CROSS_CONNECTIONS.filter(function(cc) {
    var progs = cc.programs.toLowerCase();
    return progs.indexOf(d.thinker) >= 0 || progs.indexOf(tName.toLowerCase()) >= 0;
  });
  if (related.length > 0) {
    html += '<div class="field-label" style="margin-top:14px">Cross-Tradition Connections</div>';
    related.forEach(function(cc) {
      html += '<div class="field-value" style="margin-top:6px;padding:6px;background:#1a1a2e;border-radius:4px">';
      html += '<strong>' + cc.id + ':</strong> ' + cc.question;
      html += '<br><span style="color:#888;font-size:11px">' + cc.nature + '</span>';
      html += '</div>';
    });
  }

  content.innerHTML = html;
  panel.style.display = 'block';
}

function closePanel() {
  document.getElementById('info-panel').style.display = 'none';
  if (selectedMesh) {
    var origColor = new THREE.Color(THINKER_COLORS[selectedMesh.userData.thinker] || '#888888');
    selectedMesh.material.emissive.copy(origColor.multiplyScalar(0.2));
  }
  selectedMesh = null;

// ── DISCIPLINE LABELS (2D overlay) ──
function updateDiscLabels() {
  if (!showLabels) return;
  var container = document.getElementById('disc-labels');
  container.innerHTML = '';
  var canvasRect = renderer.domElement.getBoundingClientRect();
  DISCIPLINES.forEach(function(disc, i) {
    var angle = getDiscAngle(i);
    var r = discRadius + 3;
    var worldPos = new THREE.Vector3(
      Math.cos(angle) * r,
      0.5,
      -Math.sin(angle) * r
    );
    var screenPos = worldPos.project(camera);
    var x = (screenPos.x * 0.5 + 0.5) * canvasRect.width;
    var y = (-screenPos.y * 0.5 + 0.5) * canvasRect.height;

    if (screenPos.z < 1) {
      var label = document.createElement('div');

      label.textContent = disc;
      label.style.left = x + 'px';
      label.style.top = y + 'px';
      label.style.transform = 'translate(-50%, -50%)';
      container.appendChild(label);
    }
  });
}

// ── Z-AXIS MARKERS ──
function buildZAxis() {
  // Vertical line at center
  var topY = zHeight + 2;
  var pts = [new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, topY, 0)];
  var axGeo = new THREE.BufferGeometry().setFromPoints(pts);
  var axMat = new THREE.LineBasicMaterial({ color: 0x2a2a3e, transparent: true, opacity: 0.4 });
  scene.add(new THREE.Line(axGeo, axMat));

  // Decade markers along the axis
  var startDecade = Math.ceil(minYear / 10) * 10;
  for (var yr = startDecade; yr <= maxYear; yr += 10) {
    var y = yearToZ(yr);
    // Horizontal tick
    var tickPts = [new THREE.Vector3(-1, y, 0), new THREE.Vector3(1, y, 0)];
    var tickGeo = new THREE.BufferGeometry().setFromPoints(tickPts);
    var tickMat = new THREE.LineBasicMaterial({ color: 0x3a3a4e, transparent: true, opacity: 0.5 });
    scene.add(new THREE.Line(tickGeo, tickMat));

    // Faint horizontal ring at each decade
    var ringGeo = new THREE.RingGeometry(discRadius - 0.5, discRadius + 0.5, 64);
    var ringMat = new THREE.MeshBasicMaterial({ color: 0x1a1a2e, transparent: true, opacity: 0.12, side: THREE.DoubleSide });
    var ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = -Math.PI / 2;
    ring.position.y = y;
    scene.add(ring);
  }
}

// Year labels rendered as 2D overlays
function updateYearLabels() {
  var container = document.getElementById('disc-labels');
  var canvasRect = renderer.domElement.getBoundingClientRect();
  var startDecade = Math.ceil(minYear / 10) * 10;
  for (var yr = startDecade; yr <= maxYear; yr += 10) {
    var y = yearToZ(yr);
    var worldPos = new THREE.Vector3(2, y, 0);
    var screenPos = worldPos.project(camera);
    var sx = (screenPos.x * 0.5 + 0.5) * canvasRect.width;
    var sy = (-screenPos.y * 0.5 + 0.5) * canvasRect.height;
    if (screenPos.z < 1) {
      var label = document.createElement('div');
      label.className = 'disc-label';
      label.textContent = yr.toString();
      label.style.left = sx + 'px';
      label.style.top = sy + 'px';
      label.style.transform = 'translate(-50%, -50%)';
      label.style.color = '#C9A84C';
      label.style.fontSize = '13px';
      label.style.fontWeight = '600';
      container.appendChild(label);
    }
  }
}

// ── ANIMATE ──
function animate() {
  requestAnimationFrame(animate);

  // Slow rotation of nodes for visual interest
  meshes.forEach(function(m) {
    if (m.userData.type === 'prs') {
      m.rotation.y += 0.003;
      if (m.userData.prsType === 'problem') m.rotation.x += 0.002;
    }
  });

  renderer.render(scene, camera);
  updateDiscLabels();
  updateYearLabels();
}

// ── SEARCH EVENT ──
document.getElementById('prs-search-box').addEventListener('input', function(e) {
  prsSearch(e.target.value);
});


// ── ERROR DIAGNOSTICS ──
function showError(msg) {
  var div = document.createElement('div');
  div.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:red;color:white;padding:20px;font-size:16px;z-index:9999;max-width:80%;word-wrap:break-word;border-radius:8px;';
  div.textContent = msg;
  document.body.appendChild(div);
}

try {
  var testContainer = document.getElementById('canvas-container');
  if (!testContainer) showError('canvas-container not found!');
  else if (testContainer.clientWidth === 0) showError('canvas-container width is 0! parentWidth=' + testContainer.parentElement.clientWidth);
  else showError('container OK: ' + testContainer.clientWidth + 'x' + testContainer.clientHeight + ', THREE=' + (typeof THREE));
} catch(e) {
  showError('Pre-init test error: ' + e.message);
}

// ── INIT ──
try { init(); } catch(e) { showError("init() error: " + e.message + " | " + e.stack); }
try { buildZAxis(); } catch(e) { showError("buildZAxis() error: " + e.message); }
try { buildTraditionFilters(); } catch(e) { showError("buildTraditionFilters() error: " + e.message); }
</script>
